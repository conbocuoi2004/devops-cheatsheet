name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---------- 1. Build & kiểm tra ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cài & build frontend
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Kiểm tra backend khởi động được
        working-directory: server
        run: |
          npm ci
          node --check index.js

  # ---------- 2. Build & push Docker image (chỉ khi push lên main) ----------
  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Đăng nhập GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- 3. Deploy lên VPS qua SSH (tuỳ chọn) ----------
  # Cần khai báo secrets: SSH_HOST, SSH_USER, SSH_KEY trong Settings > Secrets
  deploy:
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: SSH và cập nhật container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop devops-cheatsheet || true
            docker rm devops-cheatsheet || true
            docker run -d --name devops-cheatsheet \
              --restart unless-stopped \
              -p 8080:3000 \
              ghcr.io/${{ github.repository }}:latest
            docker image prune -f
