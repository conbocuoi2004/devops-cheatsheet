services:
  app:
    build: .
    image: devops-cheatsheet:latest
    container_name: devops-cheatsheet
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
